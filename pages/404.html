<!DOCTYPE html>
<html lang="no">
<head>

  <title>Side ikke funnet – Klar Til Gjest Nidaros</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #093540;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: 'Playfair Display', serif;

      color: #FFD166;

      margin-bottom: 1rem;

      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 600;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(214,239,243,0.65);
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .btn {
      background: #FF6B35;
      color: white;
      padding: 14px 32px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.15s;
      display: inline-block;
    }
    .btn:hover { background: #e55a25; transform: translateY(-2px); }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      text-decoration: none;
      margin-bottom: 3rem;
    }

  </style>
</head>
<body>
  <a href="../index.html" class="logo">Klar Til Gjest <span>Nidaros</span></a>

  <p>Siden du leter etter eksisterer ikke eller har blitt flyttet. Gå tilbake til forsiden!</p>
  <a href="../index.html" class="btn">Tilbake til forsiden</a>
